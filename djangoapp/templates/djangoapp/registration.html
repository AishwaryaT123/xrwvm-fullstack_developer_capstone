<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register - Cars Dealership</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
  <style>
    body { min-height: 100vh; background: linear-gradient(135deg, #1a1a2e, #16213e); display: flex; align-items: center; justify-content: center; }
    .card { border: none; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
    .btn-danger { background: #e94560; border: none; }
  </style>
</head>
<body>
<div class="container" style="max-width: 440px;">
  <div class="card p-4">
    <h3 class="fw-bold text-center mb-1">🚗 Create Account</h3>
    <p class="text-muted text-center mb-4">Join Cars Dealership today</p>

    {% if message %}
    <div class="alert alert-danger">{{ message }}</div>
    {% endif %}

    <form method="POST" action="/djangoapp/register/">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label fw-bold">Username</label>
        <input type="text" name="username" class="form-control" placeholder="Choose a username" required/>
      </div>
      <div class="mb-3">
        <label class="form-label fw-bold">First Name</label>
        <input type="text" name="firstname" class="form-control" placeholder="Enter your first name" required/>
      </div>
      <div class="mb-3">
        <label class="form-label fw-bold">Last Name</label>
        <input type="text" name="lastname" class="form-control" placeholder="Enter your last name" required/>
      </div>
      <div class="mb-3">
        <label class="form-label fw-bold">Email</label>
        <input type="email" name="email" class="form-control" placeholder="Enter your email" required/>
      </div>
      <div class="mb-4">
        <label class="form-label fw-bold">Password</label>
        <input type="password" name="psw" class="form-control" placeholder="Create a password" required/>
      </div>
      <button type="submit" class="btn btn-danger w-100 py-2 fw-bold">Register</button>
      <p class="text-center text-muted mt-3 mb-0">Already have an account? <a href="/djangoapp/login/" style="color:#e94560;">Sign In</a></p>
    </form>
  </div>
</div>
</body>
</html>
