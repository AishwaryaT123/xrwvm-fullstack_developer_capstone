<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Add Review - Cars Dealership</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #f8f9fa; }
    .navbar { background: #1a1a2e; }
    .navbar-brand, .nav-link { color: #fff !important; }
    .form-card { border: none; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    .btn-danger { background: #e94560; border: none; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/">🚗 Cars Dealership</a>
    <div class="navbar-nav ms-auto">
      <a class="nav-link" href="/">Home</a>
    </div>
  </div>
</nav>

<div class="container py-5" style="max-width: 600px;">
  <div class="card form-card p-4">
    <h3 class="fw-bold mb-1">Write a Review</h3>
    {% if dealer %}
    <p class="text-muted mb-4">{{ dealer.full_name }} — {{ dealer.city }}, {{ dealer.st }}</p>
    {% endif %}

    <form method="POST">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label fw-bold">Your Review</label>
        <textarea name="content" class="form-control" rows="4" placeholder="Share your experience..." required></textarea>
      </div>
      <div class="mb-3 form-check">
        <input type="checkbox" class="form-check-input" name="purchase" id="purchase"/>
        <label class="form-check-label" for="purchase">I purchased a car here</label>
      </div>
      <div id="purchase_details">
        <div class="mb-3">
          <label class="form-label">Purchase Date</label>
          <input type="date" name="purchasedate" class="form-control"/>
        </div>
        <div class="mb-3">
          <label class="form-label">Car Make</label>
          <input type="text" name="car_make" class="form-control" placeholder="e.g. Toyota"/>
        </div>
        <div class="mb-3">
          <label class="form-label">Car Model</label>
          {% if cars %}
          <select name="car_model" class="form-select">
            {% for car in cars %}
            <option value="{{ car.name }}">{{ car.name }}</option>
            {% endfor %}
          </select>
          {% else %}
          <input type="text" name="car_model" class="form-control" placeholder="e.g. Camry"/>
          {% endif %}
        </div>
        <div class="mb-3">
          <label class="form-label">Car Year</label>
          <input type="number" name="car_year" class="form-control" placeholder="e.g. 2022" min="2000" max="2024"/>
        </div>
      </div>
      <button type="submit" class="btn btn-danger w-100 py-2 fw-bold">Submit Review</button>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
